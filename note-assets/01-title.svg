<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- decorative circles -->
  <circle cx="950" cy="120" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="250" cy="550" r="150" fill="#22d3ee" opacity="0.06"/>
  <!-- terminal window mockup -->
  <rect x="680" y="200" width="440" height="280" rx="12" fill="#1e1e2e" stroke="#333" stroke-width="1.5"/>
  <circle cx="704" cy="220" r="6" fill="#ff5f57"/>
  <circle cx="724" cy="220" r="6" fill="#febc2e"/>
  <circle cx="744" cy="220" r="6" fill="#28c840"/>
  <text x="704" y="260" fill="#6366f1" font-size="13" font-weight="bold" font-family="monospace">[Claude]</text>
  <text x="790" y="260" fill="#94a3b8" font-size="13" font-family="monospace">開始...</text>
  <text x="704" y="284" fill="#64748b" font-size="12" font-family="monospace">  [5s]  ▶ Read</text>
  <text x="704" y="304" fill="#64748b" font-size="12" font-family="monospace">      → page.tsx</text>
  <text x="704" y="328" fill="#64748b" font-size="12" font-family="monospace">  [12s] ▶ Edit</text>
  <text x="704" y="348" fill="#64748b" font-size="12" font-family="monospace">      → auth.ts</text>
  <text x="704" y="376" fill="#6366f1" font-size="12" font-family="monospace">  ✓ 完了 1m45s | 8ターン | $0.42</text>
  <text x="704" y="404" fill="#22c55e" font-size="13" font-weight="bold" font-family="monospace">[Codex]</text>
  <text x="790" y="404" fill="#94a3b8" font-size="13" font-family="monospace">開始...</text>
  <text x="704" y="428" fill="#64748b" font-size="12" font-family="monospace">  [3s]  ▶ shell</text>
  <text x="704" y="452" fill="#22c55e" font-size="12" font-family="monospace">  ✓ 完了 52s</text>
  <!-- main text -->
  <text x="80" y="230" fill="url(#accent)" font-size="20" font-weight="600" letter-spacing="4">AI × AI</text>
  <text x="80" y="310" fill="#ffffff" font-size="64" font-weight="800" letter-spacing="-1">pair</text>
  <text x="80" y="380" fill="#94a3b8" font-size="26" font-weight="400">Claude Code × OpenAI Codex</text>
  <text x="80" y="420" fill="#94a3b8" font-size="26" font-weight="400">自動ペアプログラミング</text>
  <!-- tagline -->
  <rect x="80" y="470" width="480" height="1" fill="#334155"/>
  <text x="80" y="510" fill="#64748b" font-size="16">2つのAIが交代でコードを書き、レビューし、改善する</text>
  <!-- bottom bar -->
  <rect x="0" y="655" width="1200" height="20" fill="url(#accent)" opacity="0.3"/>
</svg>
