<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <text x="80" y="80" fill="#22c55e" font-size="16" font-weight="600" letter-spacing="3">NAVIGATOR MODE</text>
  <text x="80" y="125" fill="#ffffff" font-size="38" font-weight="700">ナビゲーター方式：リアルタイム監視</text>
  <!-- Flow: circular -->
  <!-- Step 1: Human -->
  <rect x="80" y="190" width="300" height="80" rx="12" fill="#1e1e2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="110" y="225" fill="#f59e0b" font-size="16" font-weight="700">👤 あなた</text>
  <text x="110" y="250" fill="#94a3b8" font-size="14">Claude に普通に指示を出す</text>
  <!-- Arrow down -->
  <line x1="230" y1="280" x2="230" y2="320" stroke="#475569" stroke-width="2"/>
  <polygon points="225,318 235,318 230,328" fill="#475569"/>
  <!-- Step 2: Claude works -->
  <rect x="80" y="330" width="300" height="80" rx="12" fill="#1e1e2e" stroke="#6366f1" stroke-width="2"/>
  <text x="110" y="365" fill="#6366f1" font-size="16" font-weight="700">🟣 Claude（ドライバー）</text>
  <text x="110" y="390" fill="#94a3b8" font-size="14">コードを実装・修正</text>
  <!-- Arrow right -->
  <line x1="390" y1="370" x2="470" y2="370" stroke="#475569" stroke-width="2"/>
  <polygon points="468,365 468,375 478,370" fill="#475569"/>
  <!-- Step 3: Codex reviews (auto) -->
  <rect x="490" y="330" width="320" height="80" rx="12" fill="#1e1e2e" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="358" fill="#22c55e" font-size="16" font-weight="700">🟢 Codex（ナビゲーター）</text>
  <text x="520" y="380" fill="#94a3b8" font-size="14">差分を自動レビュー</text>
  <text x="520" y="398" fill="#64748b" font-size="12">← Stop hook で自動起動</text>
  <!-- Arrow back to Claude -->
  <path d="M 650 420 L 650 470 L 230 470 L 230 420" fill="none" stroke="#475569" stroke-width="2"/>
  <polygon points="225,420 235,420 230,410" fill="#475569"/>
  <text x="380" y="488" fill="#475569" font-size="12" text-anchor="middle">フィードバック注入（UserPromptSubmit hook）</text>
  <!-- Hook detail -->
  <rect x="870" y="190" width="260" height="310" rx="12" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="898" y="225" fill="#e2e8f0" font-size="15" font-weight="700">hooks の仕組み</text>
  <text x="898" y="260" fill="#6366f1" font-size="13" font-weight="600">Stop hook</text>
  <text x="898" y="280" fill="#94a3b8" font-size="12">Claude 応答完了時に発火</text>
  <text x="898" y="298" fill="#94a3b8" font-size="12">→ Codex にdiffを送信</text>
  <text x="898" y="316" fill="#94a3b8" font-size="12">→ フィードバックを保存</text>
  <rect x="898" y="335" width="200" height="1" fill="#334155"/>
  <text x="898" y="360" fill="#22c55e" font-size="13" font-weight="600">UserPromptSubmit hook</text>
  <text x="898" y="380" fill="#94a3b8" font-size="12">次のプロンプト送信時に発火</text>
  <text x="898" y="398" fill="#94a3b8" font-size="12">→ 保存済みフィードバックを注入</text>
  <text x="898" y="416" fill="#94a3b8" font-size="12">→ Claude が自然に認識</text>
  <rect x="898" y="435" width="200" height="1" fill="#334155"/>
  <text x="898" y="460" fill="#64748b" font-size="12">LGTM → スキップ</text>
  <text x="898" y="480" fill="#64748b" font-size="12">差分3行未満 → スキップ</text>
  <!-- Key point -->
  <rect x="80" y="540" width="740" height="70" rx="10" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="120" y="572" fill="#22c55e" font-size="16" font-weight="600">💡 普通に Claude と対話するだけ。裏で Codex が見守っている</text>
  <text x="120" y="595" fill="#94a3b8" font-size="13">pair-nav start → セッション再起動 → あとは普段通り使うだけ</text>
  <rect x="0" y="655" width="1200" height="20" fill="#22c55e" opacity="0.15"/>
</svg>
