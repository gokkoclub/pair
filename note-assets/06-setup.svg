<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg6)"/>
  <text x="80" y="80" fill="#22d3ee" font-size="16" font-weight="600" letter-spacing="3">GET STARTED</text>
  <text x="80" y="125" fill="#ffffff" font-size="38" font-weight="700">セットアップは1行</text>
  <!-- Install command -->
  <rect x="80" y="170" width="1040" height="70" rx="10" fill="#1e1e2e" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="195" fill="#64748b" font-size="13" font-family="monospace">$</text>
  <text x="130" y="195" fill="#22d3ee" font-size="15" font-family="monospace" font-weight="600">git clone https://github.com/gokkoclub/pair.git /tmp/pair &amp;&amp; /tmp/pair/setup.sh</text>
  <text x="110" y="220" fill="#64748b" font-size="12" font-family="monospace">→ ~/.local/bin/pair, ~/.local/bin/pair-nav, ~/.claude/skills/ にインストール</text>
  <!-- Prerequisites -->
  <text x="80" y="290" fill="#e2e8f0" font-size="20" font-weight="600">前提条件</text>
  <rect x="80" y="310" width="320" height="60" rx="8" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="110" y="347" fill="#94a3b8" font-size="15">✓ claude CLI（Claude Code）</text>
  <rect x="420" y="310" width="320" height="60" rx="8" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="450" y="347" fill="#94a3b8" font-size="15">✓ npx @openai/codex</text>
  <rect x="760" y="310" width="360" height="60" rx="8" fill="#1e1e2e" stroke="#334155" stroke-width="1"/>
  <text x="790" y="347" fill="#94a3b8" font-size="15">✓ git リポジトリ内で実行</text>
  <!-- Usage examples -->
  <text x="80" y="430" fill="#e2e8f0" font-size="20" font-weight="600">使ってみる</text>
  <!-- Example 1 -->
  <rect x="80" y="455" width="520" height="80" rx="10" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="110" y="485" fill="#64748b" font-size="13" font-family="monospace">$</text>
  <text x="130" y="485" fill="#6366f1" font-size="14" font-family="monospace">pair "RESTful APIを追加して"</text>
  <text x="110" y="515" fill="#64748b" font-size="12">リレー方式で3ラウンドのペアプロ開始</text>
  <!-- Example 2 -->
  <rect x="620" y="455" width="500" height="80" rx="10" fill="#1e1e2e" stroke="#22c55e" stroke-width="1"/>
  <text x="650" y="485" fill="#64748b" font-size="13" font-family="monospace">$</text>
  <text x="670" y="485" fill="#22c55e" font-size="14" font-family="monospace">pair-nav start</text>
  <text x="650" y="515" fill="#64748b" font-size="12">ナビゲーター有効化（あとは普通にClaude使うだけ）</text>
  <!-- Example 3 -->
  <rect x="80" y="555" width="520" height="80" rx="10" fill="#1e1e2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="585" fill="#64748b" font-size="13" font-family="monospace">$</text>
  <text x="130" y="585" fill="#f59e0b" font-size="14" font-family="monospace">pair --mode parallel --timeout 0 "DB移行"</text>
  <text x="110" y="615" fill="#64748b" font-size="12">並列モード・タイムアウト無制限で大規模タスク</text>
  <!-- Slash commands -->
  <rect x="620" y="555" width="500" height="80" rx="10" fill="#1e1e2e" stroke="#ec4899" stroke-width="1"/>
  <text x="650" y="585" fill="#ec4899" font-size="14" font-family="monospace">/pair "タスク"</text>
  <text x="650" y="615" fill="#64748b" font-size="12">Claude Code 内からスラッシュコマンドでも使える</text>
  <rect x="0" y="655" width="1200" height="20" fill="#22d3ee" opacity="0.2"/>
</svg>
